services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  celery_worker:
    build: ./backend
    command: uv run celery -A core worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./models:/models
    depends_on:
      - db
      - redis
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb
      CELERY_BROKER_URL: redis://redis:6379/0
      HF_HOME: /models/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  celery_beat:
    build: ./backend
    command: uv run celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      - db
      - redis
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb
      CELERY_BROKER_URL: redis://redis:6379/0

  flower:
    build: ./backend
    command: uv run celery -A core flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8005
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./models:/models
    ports:
      - "8005:8005"
    depends_on:
      - db
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb
      HF_HOME: /models/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5175:5175"
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      VITE_API_BASE_URL: http://localhost:8005

volumes:
  postgres_data:
  backend_venv:
